name: Go

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - run: go test ./...
      - run: go test -race ./...
      - run: go vet ./...
      - run: go test -run '^$' -tags='live authenticated browser_install' ./...
      - name: Validate POSIX installer syntax
        run: sh -n install.sh
      - name: Validate PowerShell installer syntax
        shell: pwsh
        run: |
          $tokens = $null
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path ./install.ps1),
            [ref]$tokens,
            [ref]$parseErrors
          ) | Out-Null
          if ($parseErrors.Count -ne 0) {
            $parseErrors | ForEach-Object { Write-Error $_ }
            exit 1
          }

  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - {goos: darwin, goarch: arm64, output: music2bb, package: music2bb-darwin-arm64, archive: tar}
          - {goos: darwin, goarch: amd64, output: music2bb, package: music2bb-darwin-amd64, archive: tar}
          - {goos: windows, goarch: amd64, output: music2bb.exe, package: music2bb-windows-amd64, archive: zip}
          - {goos: windows, goarch: arm64, output: music2bb.exe, package: music2bb-windows-arm64, archive: zip}
          - {goos: linux, goarch: amd64, output: music2bb, package: music2bb-linux-amd64, archive: tar}
          - {goos: linux, goarch: arm64, output: music2bb, package: music2bb-linux-arm64, archive: tar}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Build browser-independent executable
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          OUTPUT: ${{ matrix.output }}
          PACKAGE: ${{ matrix.package }}
          VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev-{0}', github.sha) }}
        run: |
          mkdir -p "dist/${PACKAGE}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=${BUILD_DATE}" -o "dist/${PACKAGE}/${OUTPUT}" ./cmd/music2bb
          cp LICENSE.md DISCLAIMER.md THIRD_PARTY_NOTICES.md CHROMIUM_PROVENANCE.md CHROMIUM_CREDITS.html "dist/${PACKAGE}/"
          cp internal/browser/manifest.json "dist/${PACKAGE}/CHROMIUM_PROVENANCE.json"
          printf '%s\n' \
            "music2bb ${VERSION}" \
            "Commit: ${GITHUB_SHA}" \
            "Source repository: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            "Corresponding source: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${GITHUB_SHA}" \
            "Managed Chromium is downloaded separately at runtime and is not included in this package." \
            "Chromium provenance: CHROMIUM_PROVENANCE.md and CHROMIUM_PROVENANCE.json" \
            > "dist/${PACKAGE}/SOURCE.txt"
      - name: Verify package excludes Chromium binaries
        env:
          PACKAGE: ${{ matrix.package }}
          OUTPUT: ${{ matrix.output }}
        run: |
          test -f "dist/${PACKAGE}/${OUTPUT}"
          test "$(find "dist/${PACKAGE}" -type f | wc -l)" -eq 8
          test "$(stat -c '%s' "dist/${PACKAGE}/${OUTPUT}")" -lt 50000000
      - name: Create release archive and checksum
        env:
          PACKAGE: ${{ matrix.package }}
          ARCHIVE_KIND: ${{ matrix.archive }}
        run: |
          if [[ "${ARCHIVE_KIND}" == "zip" ]]; then
            (cd dist && zip -qr "${PACKAGE}.zip" "${PACKAGE}")
            (cd dist && sha256sum "${PACKAGE}.zip" > "${PACKAGE}.zip.sha256")
          else
            tar -C dist -czf "dist/${PACKAGE}.tar.gz" "${PACKAGE}"
            (cd dist && sha256sum "${PACKAGE}.tar.gz" > "${PACKAGE}.tar.gz.sha256")
          fi
          rm -rf "dist/${PACKAGE}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: dist/*
          if-no-files-found: error

  browser-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: macos-15, platform: darwin/arm64, archive: chromium-darwin-arm64.zip}
          - {os: macos-15-intel, platform: darwin/amd64, archive: chromium-darwin-amd64.zip}
          - {os: windows-latest, platform: windows/amd64, archive: chromium-windows-amd64.zip}
          - {os: windows-11-arm, platform: windows/arm64, archive: chromium-windows-arm64.zip}
          - {os: ubuntu-24.04, platform: linux/amd64, archive: chromium-linux-amd64.zip}
          - {os: ubuntu-24.04-arm, platform: linux/arm64, archive: chromium-linux-arm64.zip}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Resolve pinned managed Chromium
        id: chromium
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const artifact = require('./internal/browser/manifest.json').artifacts[process.env.PLATFORM];
          if (!artifact) throw new Error(`missing artifact for ${process.env.PLATFORM}`);
          const ready = !artifact.availability;
          for (const [key, value] of Object.entries({ready, url: artifact.archive_url, revision: artifact.revision, sha256: artifact.sha256})) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${value}\n`);
          }
          NODE
      - name: Report unpublished managed browser
        if: steps.chromium.outputs.ready != 'true'
        shell: bash
        run: |
          echo "::notice::${{ matrix.platform }} managed browser is not published; native smoke test skipped"
          echo "### ${{ matrix.platform }} managed browser" >> "$GITHUB_STEP_SUMMARY"
          echo "Not published in the manifest; native smoke test skipped." >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/cache@v4
        if: steps.chromium.outputs.ready == 'true'
        id: browser-cache
        with:
          path: .browser-cache/${{ matrix.archive }}
          key: chromium-${{ steps.chromium.outputs.revision }}-${{ steps.chromium.outputs.sha256 }}-${{ matrix.os }}
      - name: Download pinned managed Chromium
        if: steps.chromium.outputs.ready == 'true' && steps.browser-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          BROWSER_URL: ${{ steps.chromium.outputs.url }}
        run: |
          mkdir -p .browser-cache
          curl --fail --location --retry 3 --output '.browser-cache/${{ matrix.archive }}' "$BROWSER_URL"
      - name: Verify managed archive checksum
        if: steps.chromium.outputs.ready == 'true'
        shell: bash
        env:
          BROWSER_SHA256: ${{ steps.chromium.outputs.sha256 }}
          BROWSER_ARCHIVE: .browser-cache/${{ matrix.archive }}
        run: |
          node - <<'NODE'
          const crypto = require('crypto');
          const fs = require('fs');
          const actual = crypto.createHash('sha256').update(fs.readFileSync(process.env.BROWSER_ARCHIVE)).digest('hex');
          if (actual.toLowerCase() !== process.env.BROWSER_SHA256.toLowerCase()) {
            throw new Error(`archive checksum ${actual} does not match manifest`);
          }
          NODE
      - name: Install, launch, and extract a controlled page
        if: steps.chromium.outputs.ready == 'true'
        shell: bash
        env:
          MUSIC2BB_TEST_BROWSER_ARCHIVE: ${{ github.workspace }}/.browser-cache/${{ matrix.archive }}
          MUSIC2BB_TEST_BROWSER_NO_SANDBOX: ${{ runner.os == 'Linux' && '1' || '' }}
        run: go test -count=1 -tags=browser_install ./internal/browser -run TestPinnedArchiveInstallLaunchAndExtraction -v

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build, browser-smoke]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: music2bb-*
          merge-multiple: true
      - name: Refuse to replace an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "release tag must use stable semantic form vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists" >&2
            exit 1
          fi
      - name: Verify the six-platform release set
        run: |
          for target in \
            darwin-amd64 darwin-arm64 \
            linux-amd64 linux-arm64 \
            windows-amd64 windows-arm64
          do
            extension="tar.gz"
            if [[ "${target}" == windows-* ]]; then
              extension="zip"
            fi
            archive="dist/music2bb-${target}.${extension}"
            test -f "${archive}"
            test -f "${archive}.sha256"
          done
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 12
      - name: Add installer entrypoints and combined checksums
        run: |
          (cd dist && sha256sum music2bb-*.tar.gz music2bb-*.zip > checksums.txt)
          cp install.sh install.ps1 dist/
      - name: Create release and upload immutable assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes dist/*

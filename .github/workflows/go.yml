name: Go

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - run: go test ./...
      - run: go test -race ./...
      - run: go vet ./...
      - run: go test -run '^$' -tags='live authenticated browser_install' ./...

  build:
    needs: browser-smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            platform: darwin/arm64
            output: music2bb-darwin-arm64
          - goos: darwin
            goarch: amd64
            platform: darwin/amd64
            output: music2bb-darwin-amd64
          - goos: windows
            goarch: amd64
            platform: windows/amd64
            output: music2bb-windows-amd64.exe
          - goos: windows
            goarch: arm64
            platform: windows/arm64
            output: music2bb-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Resolve pinned Chromium provenance
        id: chromium
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          node -e 'const fs=require("fs"),a=require("./internal/browser/manifest.json").artifacts[process.env.PLATFORM]; for (const [k,v] of Object.entries({url:a.archive_url,sha256:a.sha256,revision:a.revision,version:a.chromium_version,commit:a.chromium_commit})) fs.appendFileSync(process.env.GITHUB_OUTPUT, `${k}=${v}\n`)'
      - uses: actions/cache@v4
        id: bundled-browser-cache
        with:
          path: internal/browser/chromium.zip
          key: bundled-chromium-${{ steps.chromium.outputs.revision }}-${{ matrix.goos }}-${{ matrix.goarch }}
      - name: Download bundled Chromium
        if: steps.bundled-browser-cache.outputs.cache-hit != 'true'
        env:
          BROWSER_URL: ${{ steps.chromium.outputs.url }}
        run: curl --fail --location --retry 3 --output internal/browser/chromium.zip "$BROWSER_URL"
      - name: Verify bundled Chromium
        env:
          BROWSER_SHA256: ${{ steps.chromium.outputs.sha256 }}
        run: echo "$BROWSER_SHA256  internal/browser/chromium.zip" | sha256sum --check
      - uses: actions/download-artifact@v4
        with:
          name: chromium-credits-${{ matrix.goos }}-${{ matrix.goarch }}
          path: .chromium-credits
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          OUTPUT: ${{ matrix.output }}
          PACKAGE: music2bb-${{ matrix.goos }}-${{ matrix.goarch }}
          VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev-{0}', github.sha) }}
        run: |
          mkdir -p "dist/${PACKAGE}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -tags=bundled_chromium -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=${BUILD_DATE}" -o "dist/${PACKAGE}/${OUTPUT}" ./cmd/music2bb
          cp LICENSE.md THIRD_PARTY_NOTICES.md CHROMIUM_PROVENANCE.md "dist/${PACKAGE}/"
          cp internal/browser/manifest.json "dist/${PACKAGE}/CHROMIUM_PROVENANCE.json"
          cp .chromium-credits/CHROMIUM_CREDITS.html "dist/${PACKAGE}/"
          printf '%s\n' \
            "music2bb ${VERSION}" \
            "Commit: ${GITHUB_SHA}" \
            "Source repository: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            "Corresponding source: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${GITHUB_SHA}" \
            > "dist/${PACKAGE}/SOURCE.txt"
          if [[ "${GOOS}" == "windows" ]]; then
            ARCHIVE="${PACKAGE}.zip"
            cd dist
            zip -r "${ARCHIVE}" "${PACKAGE}"
            rm -rf "${PACKAGE}"
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            ARCHIVE="${PACKAGE}.tar.gz"
            tar -C dist -czf "dist/${ARCHIVE}" "${PACKAGE}"
            rm -rf "dist/${PACKAGE}"
            cd dist
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: music2bb-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  browser-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            goos: darwin
            goarch: arm64
            platform: darwin/arm64
            archive: chromium-darwin-arm64.zip
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            platform: darwin/amd64
            archive: chromium-darwin-amd64.zip
          - os: windows-latest
            goos: windows
            goarch: amd64
            platform: windows/amd64
            archive: chromium-windows-amd64.zip
          - os: windows-11-arm
            goos: windows
            goarch: arm64
            platform: windows/arm64
            archive: chromium-windows-arm64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Resolve pinned Chromium provenance
        id: chromium
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          node -e 'const fs=require("fs"),a=require("./internal/browser/manifest.json").artifacts[process.env.PLATFORM]; for (const [k,v] of Object.entries({url:a.archive_url,revision:a.revision,executable:a.executable})) fs.appendFileSync(process.env.GITHUB_OUTPUT, `${k}=${v}\n`)'
      - uses: actions/cache@v4
        id: browser-cache
        with:
          path: .browser-cache/${{ matrix.archive }}
          key: chromium-${{ steps.chromium.outputs.revision }}-${{ matrix.os }}
      - name: Download pinned Chromium
        if: steps.browser-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          BROWSER_URL: ${{ steps.chromium.outputs.url }}
        run: |
          mkdir -p .browser-cache
          curl --fail --location --retry 3 --output '.browser-cache/${{ matrix.archive }}' "$BROWSER_URL"
      - name: Install, launch, and extract a controlled page
        shell: bash
        env:
          MUSIC2BB_TEST_BROWSER_ARCHIVE: ${{ github.workspace }}/.browser-cache/${{ matrix.archive }}
        run: go test -count=1 -tags=browser_install ./internal/browser -run TestPinnedArchiveInstallLaunchAndExtraction -v
      - name: Export complete Chromium credits
        shell: bash
        env:
          CHROMIUM_EXECUTABLE: ${{ steps.chromium.outputs.executable }}
        run: |
          mkdir -p .browser-cache/extracted artifacts
          unzip -q '.browser-cache/${{ matrix.archive }}' -d .browser-cache/extracted
          '.browser-cache/extracted/'"$CHROMIUM_EXECUTABLE" --headless=new --no-sandbox --disable-gpu --user-data-dir="$RUNNER_TEMP/chromium-credits" --dump-dom chrome://credits > artifacts/CHROMIUM_CREDITS.html
          test "$(wc -c < artifacts/CHROMIUM_CREDITS.html)" -gt 100000
          grep -Fq 'The Chromium Project' artifacts/CHROMIUM_CREDITS.html
          grep -Fq 'Redistribution and use in source and binary forms' artifacts/CHROMIUM_CREDITS.html
      - uses: actions/upload-artifact@v4
        with:
          name: chromium-credits-${{ matrix.goos }}-${{ matrix.goarch }}
          path: artifacts/CHROMIUM_CREDITS.html
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build, browser-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: music2bb-*
          merge-multiple: true
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
